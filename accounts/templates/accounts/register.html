{% extends 'base.html' %}

{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    }

    .register-card {
        background: white;
        border-radius: 15px;
        padding: 40px;
        box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        animation: fadeIn 0.6s ease-in-out;
    }

    .portal-title {
        font-weight: 700;
        color: #2c5364;
    }

    .form-control {
        border-radius: 8px;
        padding: 10px;
    }

    .btn-register {
        background: #2c5364;
        color: white;
        border-radius: 8px;
        padding: 10px;
        font-weight: 600;
    }

    .btn-register:hover {
        background: #203a43;
        color: white;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6">
        <div class="register-card">
            <h2 class="text-center portal-title mb-4">
                📰 City State News Portal
            </h2>

            <h4 class="text-center mb-4">Create Your Account</h4>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label>Username</label>
                    {{ form.username }}
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    {{ form.email }}
                </div>

                <div class="mb-3">
                    <label>Select Role</label>
                    {{ form.role }}
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    {{ form.password1 }}
                </div>

                <div class="mb-3">
                    <label>Confirm Password</label>
                    {{ form.password2 }}
                </div>

                <button type="submit" class="btn btn-register w-100 mt-3">
                    Register Now
                </button>

                <div class="text-center mt-3">
                    Already have an account?
                    <a href="{% url 'accounts:login' %}">Login</a>
                </div>
            </form>

        </div>
    </div>
</div>

{% endblock %}
