{% extends 'base.html' %}
{% block content %}

<div class="news-bg">
    <div class="news-card">
        <h2 class="mb-4 text-center">Create News Article</h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">News Title</label>
                {{ form.title }}
            </div>

            <div class="mb-3">
                <label class="form-label">Content</label>
                {{ form.content }}
            </div>

            <div class="mb-3">
                <label class="form-label">Upload Image</label>
                {{ form.image }}
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                {{ form.category }}
            </div>

            <div class="mb-3">
                <label class="form-label">Tags</label>
                {{ form.tags }}
            </div>

            <button class="btn btn-submit w-100">Publish News</button>
        </form>
    </div>
</div>

{% endblock %}
